services:
  # ========================================
  # POSTGRESQL DATABASE
  # ========================================
  db:
    image: postgres:15-alpine
    container_name: agritech-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agritech}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-md5}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agritech-network

  # ========================================
  # REDIS CACHE
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: agritech-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agritech-network

  # ========================================
  # BACKEND API
  # ========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agritech-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agritech}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      JWT_SECRET: ${JWT_SECRET}
      AGMARKNET_API_KEY: ${AGMARKNET_API_KEY}
      WEATHER_API_KEY: ${WEATHER_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agritech-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ========================================
  # Nginx Reverse Proxy (Optional)
  # ========================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: agritech-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "${HTTP_PORT:-80}:80"
  #     - "${HTTPS_PORT:-443}:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - backend
  #   networks:
  #     - agritech-network

# ========================================
# NETWORKS
# ========================================
networks:
  agritech-network:
    driver: bridge

# ========================================
# VOLUMES
# ========================================
volumes:
  pgdata:
  redisdata:

# ========================================
# Development override
# ========================================
# To run in development mode:
# docker-compose -f docker-compose.yml -f docker-compose.dev.yml up