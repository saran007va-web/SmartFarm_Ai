version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: agriassist_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartfarm_user
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: smartfarm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartfarm_user -d smartfarm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: agriassist_backend
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://smartfarm_user:strongpassword@db:5432/smartfarm_db
      GROQ_MODEL: llama-3.1-8b-instant
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000,https://agriintel-ai.netlify.app
      CHUNK_SIZE: 500
      CHUNK_OVERLAP: 50
      TOP_K_CHUNKS: 3
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    volumes:
      - app_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    name: smartfarm_postgres_data
  app_data:
    name: smartfarm_app_data
